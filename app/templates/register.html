{% extends 'base.html' %}
{% block title %}Create account — TaskFlow{% endblock %}
{% block content %}
<div class="auth-card card p-4">
    <div class="brand-hero">
        <i class="fa-solid fa-bolt-lightning"></i>
        <h3 class="mt-2 mb-0">Create your account</h3>
        <p class="text-secondary small">Start organising your day in seconds</p>
    </div>

    <form method="POST" action="{{ url_for('register') }}">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required autofocus
                   pattern="[A-Za-z0-9_]{2,30}" title="2–30 letters, numbers or underscore">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required minlength="6">
            <div class="form-text">At least 6 characters.</div>
        </div>
        <button class="btn btn-primary w-100" type="submit">
            <i class="fa-solid fa-user-plus"></i> Create account
        </button>
    </form>

    <p class="text-center text-secondary small mt-3 mb-0">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
</div>
{% endblock %}
